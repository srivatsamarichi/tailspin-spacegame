name: Spacegame.Web.Docker
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths-ignore:
        - '**'
  pull_request:
    branches: [ master ]

jobs:
  CONTAINER_BUILD:
    name: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2    
    # - uses: azure/docker-login@v1
    #   with:
    #     login-server: darquewarrior.azurecr.io
    #     username: ${{ secrets.REGISTRY_USERNAME }}
    #     password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Install Trivy
      run: |
        #!/bin/bash
        sudo apt-get install wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy
        echo $HOME/Library/Caches
    
    - name: build, scan and tag image
      run: |
        docker build -f $GITHUB_WORKSPACE/Tailspin.SpaceGame.Web/Dockerfile -t ghcr.io/${{ github.repository_owner }}/tailspinspacegameweb:${{ github.run_number }} .
        trivy image --severity MEDIUM,HIGH --format sarif --output trivy-results.sarif ghcr.io/${{ github.repository_owner }}/tailspinspacegameweb:${{ github.run_number }}
    
    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-results.sarif

    - name: push image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/tailspinspacegameweb:${{ github.run_number }}
