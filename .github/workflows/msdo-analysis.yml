# This workflow integrates a collection of open source static analysis tools with GitHub code scanning. For documentation, or to provide feedback, visit https://github.com/github/ossar-action

name: msdo Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
#  push:
#    branches: master

jobs:
  msdo-scan:
    name: MSDO on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        
    steps:
      # Checkout your code repository to scan
    - name: Checkout repository
      uses: actions/checkout@v6

      # Run analyzers
    - name: Run Microsoft Security DevOps Analysis
      uses: microsoft/security-devops-action@v1
      id: msdo

      # Upload alerts to the Security tab
    - name: Upload alerts to Security tab
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.msdo.outputs.sarifFile }}

      # Upload alerts file as a workflow artifact
    - name: Upload alerts file as a workflow artifact
      uses: actions/upload-artifact@v4
      with:  
        name: alerts-${{ matrix.os }}
        path: ${{ steps.msdo.outputs.sarifFile }}
