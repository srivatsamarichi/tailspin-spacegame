name: Spacegame.Web
on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  AZURE_WEBAPP_NAME: heyyworld

jobs:
  
  build-and-test:
    name: 🧪 Build and Test
    runs-on: ubuntu-latest
    environment: 
      name: AZURE
      url: https://heyyworld.azurewebsites.net/
    
    strategy:
      fail-fast: false
      matrix:
        # Supported options are ['csharp', 'cpp', 'go', 'java', 'javascript', 'python']
        language: ['csharp', 'javascript']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
        
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: Install dependencies
      run: dotnet restore

    - name: Build
      run: dotnet publish -c Release --no-restore
    
    - name: Test
      run: dotnet test --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=$GITHUB_WORKSPACE/TestResults/Coverage/      

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: space-web
        path: ${{github.workspace}}/Tailspin.SpaceGame.Web/bin/Release/netcoreapp3.1/publish
  
  code-analysis:
    name: 🔆 Sonar Qube Code Analysis
    runs-on: windows-latest
    needs: [build-and-test]
    continue-on-error: true
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        # Make sure the actual branch is checked out when running on pull requests
        ref: ${{ github.head_ref }}

    - name: Cache SonarQube Cloud packages
      uses: actions/cache@v4
      with:
        path: ~\sonar\cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar

    - name: Cache SonarQube Cloud scanner
      id: cache-sonar-scanner
      uses: actions/cache@v4
      with:
        path: ${{ runner.temp }}\scanner
        key: ${{ runner.os }}-sonar-scanner
        restore-keys: ${{ runner.os }}-sonar-scanner        

    - name: Install SonarQube Cloud scanner
      if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
        dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner
          
    - name: Build and analyze
      env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      shell: powershell
      run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"srivatsamarichi_tailspin-spacegame" /o:"srivatsamarichi" /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
          dotnet build
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}" 
          
  code-ql:
    name: ⭕️ CodeQL Security Scanning
    runs-on: ubuntu-latest
    needs: [build-and-test]
    continue-on-error: true
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
  
  webapp-deploy-sandbox:
    name: 📦 Web App Deploy - Sandbox
    runs-on: ubuntu-latest
    needs: [build-and-test, code-analysis, code-ql]
    
    steps:
    - name: Download a Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: space-web
        path: ${{github.workspace}}
     
    - name: Azure WebApp
      uses: Azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZUREWEBAPPPUBLISHPROFILE }}

  validate-site-sandbox:
    name: ✅ Validate Deployment
    runs-on: ubuntu-latest
    needs: webapp-deploy-sandbox
    
    steps:
    - name: Check the deployed service URL
      uses: jtalk/url-health-check-action@v1.2
      with:
        url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
        follow-redirect: no
        max-attempts: 3 
        retry-delay: 5s 
